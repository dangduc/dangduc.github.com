---
layout: default
---
{% assign post = page %}
<div class="column posts">

  <div class="post">
     <h1><a href="{{ post.url }}" title="{{ post.title }}" >{{ post.title }}</a></h1>
     <div class="entry">
        <div class="attributes">
           {{ post.date | date:"%A %B %e, %Y" }}<br />
        </div>  <!-- end attributes -->    
        
        {{ content }}
        
     </div> <!-- end entry -->
  </div> <!-- end post -->
  <div class="post" id="related">
    <p>
    <h1>Related Posts</h1>
    <ul class="posts">
      {% for post in site.related_posts limit:3 %}
        <li><span>{{ post.date | date_to_string }}</span> &raquo; <a href="{{ post.url }}">{{ post.title }}</a></li>
      {% endfor %}
    </ul>
    </p>
  </div>
</div> <!-- end posts -->
