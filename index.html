---
layout: default
title: DangDuc
---


<div class="column posts">
   
      {% for post in site.posts %} 
      <div class="post">
         <div class="entry">
            <div class="date">
              <div class="month">{{ post.date | date:"%b" }}</div>
              <div class="day">{{ post.date | date:"%d" }}</div>
              <div class="year">{{ post.date | date:"%Y" }}</div>
            </div>
            <div class="entry-title"><a href="{{ post.url }}" title="{{ post.title }}" >{{ post.title }}</a></div>
            
         </div> <!-- end entry -->
      </div> <!-- end post -->
      {% endfor %}
</div> <!-- end posts -->
