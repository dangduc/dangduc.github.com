---
layout: default
title: DangDuc
---


<div class="column posts">
   
      {% for post in site.posts %}
      <div class="post">
         <h1><a href="{{ post.url }}" title="{{ post.title }}" >{{ post.title }}</a></h1>
         <div class="entry">
            <div class="attributes">
               {{ post.date | date:"%A %B %d, %Y" }}<br />
            </div>  <!-- end attributes -->    
            <p>{{ post.content | strip_html | truncatewords: 25 | remove:'...' }}<a href="{{post.url}}"> [...]</a></p>
            

         </div> <!-- end entry -->
      </div> <!-- end post -->
      {% endfor %}
</div> <!-- end posts -->
